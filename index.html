/* 🔥 Progress Bar */
#progressBar {

/* Logo */

/* Desktop Menu */
.nav-links {

.nav-links a {
  text-decoration: none;

  transition: 0.3s;
}

.nav-links a:hover {
  color: #00e676;
}

/* ❌ Hide close button on desktop */
.close-wrapper {
  display: none;
}

#closeMenu {

}

/* Hamburger */
.hamburger {
  display: none;
  flex-direction: column;
  cursor: pointer;
}

.hamburger span {
  width: 25px;

  background: white;

}

/* Mobile */
@media (max-width:768px){

    display: flex;

    right: -100%;
    top: 0;
    height: 100vh;
    width: 260px;

    align-items: flex-start;
    padding: 20px;
    transition: 0.4s;
  }

    right: 0;
  }

    display: flex;
    justify-content: flex-end;
    width: 100%;
  }

  #closeMenu {
    font-size: 22px;
    cursor: pointer;
    color: white;
  }

  .nav-links li {
    margin: 15px 0;
  }
